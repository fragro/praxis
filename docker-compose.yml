services:
  ghost:
    image: ghost:5-alpine
    restart: always
    environment:
      url: https://praxisplan.org
      database__client: mysql
      database__connection__host: db
      database__connection__user: ghost
      database__connection__password: ${GHOST_DB_PASS}
      database__connection__database: ghost
      NODE_ENV: production
      privacy__useGravatar: false
      mail__transport: SMTP
      mail__from: "PRAXIS <noreply@praxisplan.org>"
      mail__options__host: smtp.resend.com
      mail__options__port: 587
      mail__options__secure: "false"
      mail__options__auth__user: resend
      mail__options__auth__pass: ${RESEND_API_KEY}
    volumes:
      - ghost_content:/var/lib/ghost/content
      - ./praxis-ghost-theme:/var/lib/ghost/content/themes/praxis
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${GHOST_DB_PASS}
    volumes:
      - ghost_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - ghost
      - umami

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASS}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy

  umami-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASS}
    volumes:
      - umami_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ghost_content:
  ghost_db:
  umami_db:
  certbot_webroot:
